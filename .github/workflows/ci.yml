name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travelo/database generate
      - run: pnpm --filter @travelo/database exec prisma validate
      - run: pnpm --filter @travelo/api exec tsc -p tsconfig.build.json --noEmit
      - run: pnpm --filter @travelo/web exec tsc --noEmit
      - run: pnpm --filter @travelo/api lint
      - run: pnpm --filter @travelo/web lint
      - run: pnpm --filter @travelo/api build
      - run: pnpm --filter @travelo/web build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: travelo
          POSTGRES_PASSWORD: travelo_dev
          POSTGRES_DB: travelo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://travelo:travelo_dev@localhost:5432/travelo

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travelo/database generate
      - run: pnpm --filter @travelo/database exec prisma migrate deploy
      - run: pnpm --filter @travelo/database seed
      - run: pnpm --filter @travelo/api test
