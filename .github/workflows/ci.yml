name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @travelo/database generate

      - name: Build API
        run: pnpm --filter @travelo/api build

      - name: Build Web
        run: pnpm --filter @travelo/web build

      - name: Lint API
        run: pnpm --filter @travelo/api lint

      - name: Type check API
        run: pnpm --filter @travelo/api exec tsc --noEmit

      - name: Type check Web
        run: pnpm --filter @travelo/web exec tsc --noEmit

      - name: Run migration
        run: pnpm --filter @travelo/database exec prisma migrate deploy

      - name: Run tests
        run: pnpm --filter @travelo/api test
